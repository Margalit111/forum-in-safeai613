<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- מעבר צבעים טורקיז למגן -->
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10a37f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d8f6f;stop-opacity:1" />
    </linearGradient>
    
    <!-- צל עדין להבלטה -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- שער סגור - שמאל -->
  <g transform="translate(60, 50)">
    <!-- מסגרת השער -->
    <path d="M0 400 V100 C0 20, 280 20, 280 100 V400" fill="none" stroke="#999" stroke-width="5"/>
    
    <!-- סורגים בצבע רך -->
    <g stroke="#bbb" stroke-width="2">
      <line x1="40" y1="55" x2="40" y2="400" />
      <line x1="100" y1="35" x2="100" y2="400" />
      <line x1="180" y1="35" x2="180" y2="400" />
      <line x1="240" y1="55" x2="240" y2="400" />
      <path d="M2 150 H278 M2 280 H278" stroke="#ccc" />
    </g>

    <!-- תוויות דומיינים חסומים - מרווחים שווים (y=150, y=235, y=320) -->
    <g font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">
      <!-- בלוק 1 -->
      <rect x="45" y="135" width="190" height="30" rx="4" fill="#666" />
      <text x="140" y="155" fill="#ff9999">api.openai.com</text>
      
      <!-- בלוק 2 -->
      <rect x="45" y="220" width="190" height="30" rx="4" fill="#666" />
      <text x="140" y="240" fill="#ff9999">api.google.com</text>
      
      <!-- בלוק 3 -->
      <rect x="45" y="305" width="190" height="30" rx="4" fill="#666" />
      <text x="140" y="325" fill="#ff9999">api.anthropic.com</text>
    </g>
  </g>

  <!-- שער פתוח - ימין -->
  <g transform="translate(460, 50)">
    <!-- מסגרת המעבר (הפתח) -->
    <path d="M0 400 V100 C0 20, 280 20, 280 100 V400" fill="none" stroke="#999" stroke-width="5"/>
    
    <!-- כנף השער הפתוחה -->
    <path d="M280 100 C280 20, 450 60, 450 140 V420 L280 400" fill="#fafafa" stroke="#ccc" stroke-width="2" />
    <line x1="280" y1="200" x2="450" y2="240" stroke="#ddd" stroke-width="2" />
    <line x1="280" y1="300" x2="450" y2="340" stroke="#ddd" stroke-width="2" />

    <!-- המגן הטורקיז הגדול -->
    <g transform="translate(20, 80)" filter="url(#softShadow)">
      <path d="M120 15 C 145 15, 155 5, 175 5 L 200 5 V 110 C 200 160, 120 195, 120 195 C 120 195, 40 160, 40 110 V 5 L 65 5 C 85 5, 95 15, 120 15 Z" 
            fill="url(#shieldGradient)" />
      
      <!-- כתובת בשורה אחת - מודגשת ומרכזית -->
      <text x="120" y="112" font-family="'Segoe UI', Tahoma, sans-serif" font-size="16" font-weight="900" fill="#ffffff" text-anchor="middle">https://safeai613.com/v1</text>
    </g>
  </g>
</svg>
