<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- הגדרת מעבר הצבעים המקורי -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10a37f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d8f6f;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- SafeAI - גופן Segoe UI מיושר לקו y=80 -->
  <text x="20" y="80" 
        font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" 
        font-size="52" 
        font-weight="bold" 
        fill="#222">SafeAI</text>
  
  <!-- 613 - קטן יותר, כתב יד, נטוי, מיושר לאותו קו y=80 -->
  <text x="182" y="80" 
        font-family="'Brush Script MT', 'Comic Sans MS', cursive" 
        font-size="52" 
        font-style="italic" 
        fill="url(#brandGradient)">613</text>
</svg>
