litellm_settings:
  drop_params: true
  # חשוב! מאפשר העברת API keys דינמית
  allow_user_auth: true
  # אופציונלי - logging
  success_callback: ["langfuse"]
  set_verbose: False # מומלץ לכבות ב-Production כדי לחסוך בלוגים