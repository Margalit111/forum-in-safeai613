# version: "3.8"

services:
  # 1. בסיס הנתונים PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: litellm-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=llm_user
      - POSTGRES_PASSWORD=llm_pass
      - POSTGRES_DB=litellm_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. MongoDB
  # mongodb:
  #   image: mongo:7-jammy
  #   container_name: safe-ai-mongodb
  #   restart: unless-stopped
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongodb_data:/data/db

  # 3. LiteLLM Proxy
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    environment:
      - DATABASE_URL=postgresql://llm_user:llm_pass@db:5432/litellm_db
      - LITELLM_MASTER_KEY=sk-safe-ai-master-123
      - SSL_VERIFY=false
      - HTTPX_SSL_VERIFY=false
    command: ["--config", "/app/config.yaml", "--port", "4000"]

  # 4. השרת שלך
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: safe-ai-server-dev
    restart: unless-stopped
    depends_on:
      - litellm
      # - mongodb
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=production
      - LITELLM_PROXY_URL=http://litellm:4000
      - MONGO_URI=${MONGO_URI}


      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
volumes:
  postgres_data:
  # mongodb_data:
  node_modules:
